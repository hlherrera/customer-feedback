openapi: 3.0.3
info:
  title: Customer Feedback API
  version: 1.0.0
  description: Minimal API for collecting cafe customer feedback.
servers:
  - url: /api
tags:
  - name: Feedback
    description: Customer feedback submissions
  - name: Cafes
    description: Available cafe/store choices
paths:
  /cafes:
    get:
      tags: [Cafes]
      operationId: app.api.controllers.cafe_controller.list_cafes
      summary: List available cafes
      description: Returns seeded cafe/store choices for feedback submissions.
      responses:
        "200":
          description: Available cafes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cafe"
              examples:
                seeded:
                  value:
                    - id: 1
                      name: "McDonald's"
                      description: Quick-service cafe counter for familiar food and coffee stops.
                    - id: 2
                      name: BK
                      description: Casual burger cafe for quick meals and visit feedback.
                    - id: 3
                      name: KFC
                      description: Fast-service chicken cafe for meal and service feedback.
  /feedback:
    post:
      tags: [Feedback]
      operationId: app.api.controllers.feedback_controller.create_feedback
      summary: Submit customer feedback
      description: Creates one feedback submission after Connexion validates the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackCreate"
            examples:
              valid:
                value:
                  cafe_id: 1
                  email: person@example.com
                  comment: Great coffee.
                  rating: 5
                  highlight: Coffee
      responses:
        "201":
          description: Feedback created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
              examples:
                created:
                  value:
                    id: 1
                    cafe_id: 1
                    email: person@example.com
                    comment: Great coffee.
                    rating: 5
                    highlight: Coffee
                    created_at: "2026-07-02T00:00:00+00:00"
                    cafe:
                      id: 1
                      name: "McDonald's"
                      description: Quick-service cafe counter for familiar food and coffee stops.
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
    get:
      tags: [Feedback]
      operationId: app.api.controllers.feedback_controller.list_feedback
      summary: List feedback submissions
      description: Returns stored feedback in creation order.
      responses:
        "200":
          description: Feedback submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackResponse"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Cafe:
      type: object
      required: [id, name, description]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
          maxLength: 1000
    FeedbackCreate:
      type: object
      required: [cafe_id, email, comment, rating, highlight]
      additionalProperties: false
      properties:
        cafe_id:
          type: integer
          minimum: 1
        email:
          type: string
          format: email
          pattern: ^[^\s@]+@[^\s@]+\.[^\s@]+$
          maxLength: 255
        comment:
          type: string
          minLength: 1
          maxLength: 1000
        rating:
          type: integer
          minimum: 1
          maximum: 5
        highlight:
          type: string
          enum: [Food, Coffee, Service, Atmosphere]
    FeedbackResponse:
      type: object
      required: [id, cafe_id, email, comment, rating, highlight, created_at, cafe]
      additionalProperties: false
      properties:
        id:
          type: integer
        cafe_id:
          type: integer
        email:
          type: string
          format: email
          maxLength: 255
        comment:
          type: string
          minLength: 1
          maxLength: 1000
        rating:
          type: integer
          minimum: 1
          maximum: 5
        highlight:
          type: string
          enum: [Food, Coffee, Service, Atmosphere]
        created_at:
          type: string
          format: date-time
        cafe:
          $ref: "#/components/schemas/Cafe"
    ErrorResponse:
      type: object
      required: [title, detail, status]
      additionalProperties: true
      properties:
        type:
          type: string
        title:
          type: string
        detail:
          type: string
        status:
          type: integer
