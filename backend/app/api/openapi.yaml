openapi: 3.0.3
info:
  title: Customer Feedback API
  version: 1.0.0
  description: Minimal API for collecting cafe customer feedback.
servers:
  - url: /api
tags:
  - name: Feedback
    description: Customer feedback submissions
paths:
  /feedback:
    post:
      tags: [Feedback]
      operationId: app.api.controllers.feedback_controller.create_feedback
      summary: Submit customer feedback
      description: Creates one feedback submission after Connexion validates the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackCreate"
            examples:
              valid:
                value:
                  email: person@example.com
                  comment: Great coffee.
                  rating: 5
                  highlight: Coffee
      responses:
        "201":
          description: Feedback created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
              examples:
                created:
                  value:
                    id: 1
                    email: person@example.com
                    comment: Great coffee.
                    rating: 5
                    highlight: Coffee
                    created_at: "2026-07-02T00:00:00+00:00"
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
    get:
      tags: [Feedback]
      operationId: app.api.controllers.feedback_controller.list_feedback
      summary: List feedback submissions
      description: Returns stored feedback in creation order.
      responses:
        "200":
          description: Feedback submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackResponse"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    FeedbackCreate:
      type: object
      required: [email, comment, rating, highlight]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          pattern: ^[^\s@]+@[^\s@]+\.[^\s@]+$
          maxLength: 255
        comment:
          type: string
          minLength: 1
          maxLength: 1000
        rating:
          type: integer
          minimum: 1
          maximum: 5
        highlight:
          type: string
          enum: [Food, Coffee, Service, Atmosphere]
    FeedbackResponse:
      type: object
      required: [id, email, comment, rating, highlight, created_at]
      additionalProperties: false
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
          maxLength: 255
        comment:
          type: string
          minLength: 1
          maxLength: 1000
        rating:
          type: integer
          minimum: 1
          maximum: 5
        highlight:
          type: string
          enum: [Food, Coffee, Service, Atmosphere]
        created_at:
          type: string
          format: date-time
    Problem:
      type: object
      required: [title, detail, status]
      additionalProperties: true
      properties:
        type:
          type: string
        title:
          type: string
        detail:
          type: string
        status:
          type: integer
