services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://feedback:feedback@db:5432/feedback
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-feedback}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - feedback_db:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    profiles: ["quality"]
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    volumes:
      - sonarqube_community_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  feedback_db:
  sonarqube_community_data:
  sonarqube_extensions:
  sonarqube_logs:
